<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-label="PERV Atlas">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="55%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <radialGradient id="cap" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="60%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </radialGradient>
    <linearGradient id="pig" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.98"/>
      <stop offset="100%" stop-color="#e2e8f0" stop-opacity="0.95"/>
    </linearGradient>
  </defs>

  <rect width="48" height="48" rx="11" fill="url(#bg)"/>

  <!-- Subtle grid hint of genome tracks -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="0.5">
    <line x1="0" y1="14" x2="48" y2="14"/>
    <line x1="0" y1="24" x2="48" y2="24"/>
    <line x1="0" y1="34" x2="48" y2="34"/>
  </g>

  <!-- Virus capsid: icosahedral silhouette with spikes -->
  <g transform="translate(24 24)">
    <!-- spikes (envelope glycoproteins) -->
    <g stroke="#bae6fd" stroke-width="1.1" stroke-linecap="round" fill="#bae6fd">
      <g>
        <line x1="0" y1="-14" x2="0" y2="-18"/>
        <circle cx="0" cy="-18.6" r="1.2"/>
      </g>
      <g transform="rotate(60)">
        <line x1="0" y1="-14" x2="0" y2="-18"/>
        <circle cx="0" cy="-18.6" r="1.2"/>
      </g>
      <g transform="rotate(120)">
        <line x1="0" y1="-14" x2="0" y2="-18"/>
        <circle cx="0" cy="-18.6" r="1.2"/>
      </g>
      <g transform="rotate(180)">
        <line x1="0" y1="-14" x2="0" y2="-18"/>
        <circle cx="0" cy="-18.6" r="1.2"/>
      </g>
      <g transform="rotate(240)">
        <line x1="0" y1="-14" x2="0" y2="-18"/>
        <circle cx="0" cy="-18.6" r="1.2"/>
      </g>
      <g transform="rotate(300)">
        <line x1="0" y1="-14" x2="0" y2="-18"/>
        <circle cx="0" cy="-18.6" r="1.2"/>
      </g>
      <g transform="rotate(30)">
        <line x1="0" y1="-14" x2="0" y2="-17.4"/>
        <circle cx="0" cy="-18" r="1"/>
      </g>
      <g transform="rotate(90)">
        <line x1="0" y1="-14" x2="0" y2="-17.4"/>
        <circle cx="0" cy="-18" r="1"/>
      </g>
      <g transform="rotate(150)">
        <line x1="0" y1="-14" x2="0" y2="-17.4"/>
        <circle cx="0" cy="-18" r="1"/>
      </g>
      <g transform="rotate(210)">
        <line x1="0" y1="-14" x2="0" y2="-17.4"/>
        <circle cx="0" cy="-18" r="1"/>
      </g>
      <g transform="rotate(270)">
        <line x1="0" y1="-14" x2="0" y2="-17.4"/>
        <circle cx="0" cy="-18" r="1"/>
      </g>
      <g transform="rotate(330)">
        <line x1="0" y1="-14" x2="0" y2="-17.4"/>
        <circle cx="0" cy="-18" r="1"/>
      </g>
    </g>

    <!-- capsid hex outline -->
    <polygon points="0,-13.5 11.7,-6.75 11.7,6.75 0,13.5 -11.7,6.75 -11.7,-6.75"
             fill="url(#cap)" stroke="#0c4a6e" stroke-width="0.9" stroke-linejoin="round"/>
    <!-- inner facets -->
    <g fill="none" stroke="#0c4a6e" stroke-opacity="0.55" stroke-width="0.7">
      <line x1="0" y1="-13.5" x2="0" y2="13.5"/>
      <line x1="-11.7" y1="-6.75" x2="11.7" y2="6.75"/>
      <line x1="11.7" y1="-6.75" x2="-11.7" y2="6.75"/>
    </g>

    <!-- pig silhouette inside capsid -->
    <g transform="translate(-0.5 1.2)" fill="url(#pig)" stroke="#0c4a6e" stroke-width="0.55" stroke-linejoin="round">
      <!-- ear -->
      <path d="M -5.6 -4.2 L -4.2 -7.4 L -2.0 -5.2 Z"/>
      <!-- body/head -->
      <path d="M -6.2 -2.6
               C -7.4 -0.4, -7.0 3.0, -4.8 4.4
               C -2.2 5.8, 2.4 5.6, 4.6 4.4
               L 6.2 4.4
               C 6.9 4.4, 7.1 3.8, 6.8 3.2
               L 6.0 1.8
               C 7.0 0.4, 7.2 -1.4, 6.4 -2.6
               L 5.0 -2.6
               C 4.0 -3.4, 2.2 -3.8, 0.4 -3.6
               C -1.6 -3.4, -3.2 -3.0, -4.2 -2.4
               Z"/>
      <!-- snout -->
      <ellipse cx="5.4" cy="0.4" rx="1.9" ry="1.4" fill="#fecaca" stroke="#0c4a6e" stroke-width="0.4"/>
      <circle cx="4.8" cy="0.4" r="0.32" fill="#0c4a6e"/>
      <circle cx="6.0" cy="0.4" r="0.32" fill="#0c4a6e"/>
      <!-- eye -->
      <circle cx="1.6" cy="-1.2" r="0.55" fill="#0c4a6e"/>
      <!-- leg hints -->
      <rect x="-3.6" y="4.2" width="1.2" height="2.2" rx="0.4"/>
      <rect x="2.2" y="4.2" width="1.2" height="2.2" rx="0.4"/>
    </g>
  </g>

  <!-- Mini RNA strand winding through bottom-right (retrovirus = RNA genome) -->
  <path d="M 32 38 Q 36 34 40 38 Q 44 42 40 44"
        fill="none" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <path d="M 32 40 Q 36 36 40 40 Q 44 44 40 46"
        fill="none" stroke="#f472b6" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
</svg>
